<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NomadsPeople — dev preview</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #1a1a1a;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        box-sizing: border-box;
      }
      .phone {
        position: relative;
        width: 390px;
        height: 844px;
        max-height: calc(100vh - 32px);
        border: 1px solid #333;
        border-radius: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        background: #fff;
        overflow: hidden;
      }
      .phone iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      .label {
        position: fixed;
        bottom: 12px;
        left: 0;
        right: 0;
        text-align: center;
        color: #666;
        font-size: 11px;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <div class="phone">
      <iframe src="/" title="NomadsPeople app"></iframe>
    </div>
    <div class="label">dev preview · 390 × 844</div>
  </body>
</html>
